name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - run: npm run build

      - name: Deploy to server
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          # MEDIUM-4: move to GitHub Secret DEPLOY_SERVER when ready
          SERVER: 91.210.106.218
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Pinned host key — do NOT replace with ssh-keyscan (MITM risk)
          echo "91.210.106.218 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAILYuh4kA/ITTnupso0ZxBpSbv03PSGyV3v9zgGDNXL1c" >> ~/.ssh/known_hosts

          # Sync built files to server
          rsync -avz --delete -e "ssh -i ~/.ssh/deploy_key" \
            dist/ deploy@$SERVER:/opt/abc-schedule/pocketbase/pb_public/

          # Pull latest code on server
          ssh -i ~/.ssh/deploy_key deploy@$SERVER "cd /opt/abc-schedule/app && git pull origin main"

          # Sync PocketBase hooks and restart
          rsync -avz --delete -e "ssh -i ~/.ssh/deploy_key" \
            pocketbase/pb_hooks/ deploy@$SERVER:/opt/abc-schedule/pocketbase/pb_hooks/
          ssh -i ~/.ssh/deploy_key deploy@$SERVER "sudo systemctl restart pocketbase"
