name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Deploy to server
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SERVER: 91.210.106.218
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $SERVER >> ~/.ssh/known_hosts 2>/dev/null

          # Sync built files to server
          rsync -avz --delete -e "ssh -i ~/.ssh/deploy_key" \
            dist/ root@$SERVER:/opt/abc-schedule/pocketbase/pb_public/

          # Pull latest code on server (for future seed scripts, etc.)
          ssh -i ~/.ssh/deploy_key root@$SERVER "cd /opt/abc-schedule/app && git pull origin main"

          # Sync PocketBase hooks and restart
          ssh -i ~/.ssh/deploy_key root@$SERVER "
            cp -r /opt/abc-schedule/app/pocketbase/pb_hooks/ /opt/abc-schedule/pocketbase/pb_hooks/
            systemctl restart pocketbase 2>/dev/null || true
          "
